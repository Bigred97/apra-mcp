id: LIFE_INSURANCE_HISTORICAL
name: Life Insurance Performance Statistics — historical (pre-AASB17, June 2008 to June 2023)
description: |
  Long-format historical life insurance database covering 15 years of quarterly
  data, June 2008 to June 2023. Reported on the pre-AASB-17 framework (now
  superseded). ~66,900 rows. Use for long-run historical analysis; current data
  is in LIFE_INSURANCE. Values cannot be directly spliced across the Q3-2023
  break — APRA explicitly warns against direct comparison.
  Source: APRA Quarterly Life Insurance Performance Statistics — historical
  data XLSX.
period_coverage: June 2008 → June 2023
update_frequency: archived (no further updates)
source_url: https://www.apra.gov.au/quarterly-life-insurance-performance-statistics
download_url: https://www.apra.gov.au/sites/default/files/2025-06/Quarterly%20Life%20Insurance%20Performance%20Statistics%20Database%20%28historical%20data%29%20June%202008%20to%20June%202023.xlsx
format: xlsx
sheet: Data
header_row: 1
layout: wide
cache_kind: data
period_column: Reporting date
framework:
  current_basis: pre-AASB17
  break_date: "2023-06-30"
  break_reason: Final reporting period before AASB 17 + capital framework change.
  historical_dataset: null
search_keywords:
  - life insurance
  - historical
  - archive
  - pre aasb 17
  - long run
  - back series
  - 15 year
discovery:
  landing_url: https://www.apra.gov.au/quarterly-life-insurance-performance-statistics
  # Match in any order — APRA filenames put "Database" before "(historical data)".
  filename_pattern: '(?i)^(?=.*life\s+insurance)(?=.*database)(?=.*historical)'
  prefer_database: true
columns:
  period:
    source_column: "Reporting date"
    description: Quarter end date.
    role: dimension
    dtype: date
  industry_sector:
    source_column: "Industry sector"
    description: Industry sector (typically 'Total Industry').
    role: dimension
    dtype: string
    permissive: true
  subject:
    source_column: "Subject"
    description: Top-level subject area (e.g. "Financial performance").
    role: dimension
    dtype: string
    permissive: true
  category:
    source_column: "Category"
    description: Category (e.g. "Revenue", "Expenses", "Capital").
    role: dimension
    dtype: string
    permissive: true
  data_item:
    source_column: "Data item"
    description: Specific metric.
    role: dimension
    dtype: string
    permissive: true
  reporting_structure:
    source_column: "Reporting Structure"
    description: Reporting structure (Entity total, Total statutory funds, etc.).
    role: dimension
    dtype: string
    permissive: true
  class_of_business:
    source_column: "Class of business"
    description: Class of business.
    role: dimension
    dtype: string
    permissive: true
  product_group:
    source_column: "Product Group"
    description: Product group.
    role: dimension
    dtype: string
    permissive: true
  calculation_basis:
    source_column: "Calculation basis"
    description: "'Flow (quarterly)', 'Flow (annual)', 'Stock'."
    role: dimension
    dtype: string
  notes:
    source_column: "Notes"
    description: APRA footnotes for this observation, when present.
    role: dimension
    dtype: string
    permissive: true
  value:
    source_column: "Value $"
    description: Reported value in $ (Australian dollars).
    unit: AUD
    role: measure
    dtype: float
